# =============================================================================
# ORLO DOCS - DOCKER COMPOSE (LOCAL DEVELOPMENT)
# =============================================================================
#
# This file sets up LiteDocs for local development and testing.
#
# Usage:
#   docker-compose up        # Start in foreground
#   docker-compose up -d     # Start in background
#   docker-compose down      # Stop and remove containers
#   docker-compose logs -f   # Follow logs
#
# The content and private directories are mounted as volumes,
# so changes will be reflected immediately.

version: '3.8'

services:
  orlo-docs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_SITE_NAME: Orlo
        NUXT_PUBLIC_SITE_DESCRIPTION: Orlo Documentation
    
    ports:
      - "3000:3000"
    
    # Mount content directories for live editing
    volumes:
      - ./content:/app/content:ro
      - ./private:/app/private:ro
    
    # Environment variables
    environment:
      # Authentication mode: 'public' or 'private'
      - AUTH_MODE=public
      
      # JWT secret (CHANGE IN PRODUCTION!)
      - JWT_SECRET=dev-secret-change-in-production
      
      # AWS SES (required for private mode)
      # - AWS_REGION=us-east-1
      # - AWS_ACCESS_KEY_ID=your-access-key
      # - AWS_SECRET_ACCESS_KEY=your-secret-key
      # - EMAIL_FROM=no-reply@example.com
      
      # Site metadata
      - NUXT_PUBLIC_SITE_NAME=Orlo
      - NUXT_PUBLIC_SITE_DESCRIPTION=Orlo Documentation
      
      # Google Analytics (optional)
      # - NUXT_PUBLIC_GTAG_ID=G-XXXXXXXXXX
    
    # Restart policy
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

