version: '3.8'

services:
  orlo-docs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_SITE_NAME: ${NUXT_PUBLIC_SITE_NAME:-Orlo}
        NUXT_PUBLIC_SITE_DESCRIPTION: ${NUXT_PUBLIC_SITE_DESCRIPTION:-Orlo Documentation}
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      AUTH_MODE: ${AUTH_MODE:-public}
      F0_MODE: ${F0_MODE:-docs}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      NUXT_PUBLIC_SITE_NAME: ${NUXT_PUBLIC_SITE_NAME:-Orlo}
      NUXT_PUBLIC_SITE_DESCRIPTION: ${NUXT_PUBLIC_SITE_DESCRIPTION:-Orlo Documentation}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-https://docs.useorlo.com}
      NUXT_PUBLIC_GTAG_ID: ${NUXT_PUBLIC_GTAG_ID:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@useorlo.com}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
